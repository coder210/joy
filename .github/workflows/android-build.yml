name: Build joy2d for Android

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        target: [loader, adventure]      # 并行构建两个目标
        macro: [BUILD_LOADER, BUILD_ADVENTURE]
      fail-fast: false                   # 一个失败不影响另一个

    name: Build ${{ matrix.target }} APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（包含子模块）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 设置 JDK 17（Gradle 需要）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 将项目根目录下的 build.gradle 复制到 SDL 的 Android 项目模板中
      - name: Copy build.gradle to SDL project
        run: |
          cp build.gradle SDL/android-project/app/

      # 4. 根据目标临时修改 build.gradle 中的 CMake 参数
      - name: Modify CMake arguments in build.gradle
        run: |
          cd SDL/android-project/app/
          # 备份原文件
          cp build.gradle build.gradle.bak
          
          sed -i -E 's/arguments "?[^"]*"?/arguments "-D${{ matrix.macro }}=ON"/' build.gradle
          
          # 如果文件中根本没有 arguments 行，则在 defaultConfig 块内插入
          if ! grep -q "arguments" build.gradle; then
            sed -i '/defaultConfig {/a \        externalNativeBuild.cmake.arguments "-D${{ matrix.macro }}=ON"' build.gradle
          fi
          
          # 打印修改后的内容
          cat build.gradle

      # 5. 构建 APK
      - name: Build APK
        run: |
          cd SDL/android-project/
          chmod +x gradlew
          ./gradlew assembleDebug

      # 6. 上传 APK 产物，文件名区分目标
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: joy2d-${{ matrix.target }}-debug
          path: SDL/android-project/app/build/outputs/apk/debug/app-debug.apk