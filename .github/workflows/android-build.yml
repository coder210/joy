name: Build joy2d for Android

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        target: [loader, adventure]          # 两个构建目标
    name: Build ${{ matrix.target }} APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 将项目根目录下自定义的 build.gradle 复制到 SDL 的 Android 项目模板中
      - name: Update the build.gradle
        run: |
          cp build.gradle SDL/android-project/app/

      # 根据矩阵目标执行 Gradle 构建，同时传递 CMake 选项
      - name: Build the APK for ${{ matrix.target }}
        run: |
          cd SDL/android-project/
          chmod +x gradlew
          # 清理之前的构建产物（在新 job 中非必须，但保持习惯）
          ./gradlew clean
          if [ "${{ matrix.target }}" == "loader" ]; then
            ./gradlew assembleDebug -Penable_loader=ON -Penable_adventure=OFF
          else
            ./gradlew assembleDebug -Penable_loader=OFF -Penable_adventure=ON
          fi

      # 上传构建出的 APK，并重命名 artifact 以便区分
      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: joy2d-${{ matrix.target }}-debug.apk
          path: SDL/android-project/app/build/outputs/apk/debug/app-debug.apk