name: Build joy2d For Web
on: [push, pull_request]

jobs:
  build-web:
    name: Build joy2d for Web (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [loader, adventure]
        include:
          - project: loader
            BUILD_LOADER: ON
            BUILD_ADVENTURE: OFF
          - project: adventure
            BUILD_LOADER: OFF
            BUILD_ADVENTURE: ON

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git --depth=1
          cd emsdk
          ./emsdk install tot
          ./emsdk activate tot

      - name: Configure with Emscripten
        run: |
          source emsdk/emsdk_env.sh
          emcmake cmake -S . -B build \
            -DCMAKE_C_FLAGS="-s USE_PTHREADS=0" \
            -DCMAKE_CXX_FLAGS="-s USE_PTHREADS=0" \
            -DBUILD_LOADER=${{ matrix.BUILD_LOADER }} \
            -DBUILD_ADVENTURE=${{ matrix.BUILD_ADVENTURE }}

      - name: Build
        run: |
          source emsdk/emsdk_env.sh
          cmake --build build --parallel --verbose

      - name: List build directory (debug)
        run: ls -la build/

      - name: Prepare for upload (per project)
        run: |
          mkdir -p _site_${{ matrix.project }}
          # 复制所有 Web 相关文件（跟随符号链接）
          cp -L build/*.wasm build/*.js build/*.html build/*.data _site_${{ matrix.project }}/ 2>/dev/null || true
          # 将主 HTML 重命名为 index.html（如果存在）
          if [ -f "_site_${{ matrix.project }}/joy2d_${{ matrix.project }}.html" ]; then
            mv "_site_${{ matrix.project }}/joy2d_${{ matrix.project }}.html" "_site_${{ matrix.project }}/index.html"
          fi
          # 删除任何残留的符号链接（确保安全）
          find _site_${{ matrix.project }} -type l -delete

      - name: Verify no symlinks remain
        run: |
          if [ $(find _site_${{ matrix.project }} -type l | wc -l) -ne 0 ]; then
            echo "::error::Symlinks still exist in artifact"
            exit 1
          fi

      - name: Fix permissions
        run: |
          chmod -c -R +rX "_site_${{ matrix.project }}" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      # 使用专为 GitHub Pages 设计的 artifact 上传 action
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: joy2d-${{ matrix.project }}-web   # 为每个项目指定唯一名称
          path: _site_${{ matrix.project }}/

  deploy:
    needs: build-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages (loader only)
        id: deployment
        uses: actions/deploy-pages@v3
        with:
          artifact_name: joy2d-loader-web   # 与上传时的名称一致，部署 loader 版本