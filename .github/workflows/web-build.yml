name: Build joy2d For Web
on: [push, pull_request]

jobs:
  build-web:
    name: Build joy2d for Web (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [loader, adventure]
        include:
          - project: loader
            BUILD_LOADER: ON
            BUILD_ADVENTURE: OFF
          - project: adventure
            BUILD_LOADER: OFF
            BUILD_ADVENTURE: ON

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git --depth=1
          cd emsdk
          ./emsdk install tot
          ./emsdk activate tot

      - name: Configure with Emscripten
        run: |
          source emsdk/emsdk_env.sh
          emcmake cmake -S . -B build \
            -DCMAKE_C_FLAGS="-s USE_PTHREADS=0" \
            -DCMAKE_CXX_FLAGS="-s USE_PTHREADS=0" \
            -DBUILD_LOADER=${{ matrix.BUILD_LOADER }} \
            -DBUILD_ADVENTURE=${{ matrix.BUILD_ADVENTURE }}

      - name: Build
        run: |
          source emsdk/emsdk_env.sh
          cmake --build build --parallel --verbose

      - name: Prepare for upload (per project)
        run: |
          mkdir -p _site_${{ matrix.project }}
          cp build/joy2d_${{ matrix.project }}.* _site_${{ matrix.project }}/ 2>/dev/null || true
          if [ -f "_site_${{ matrix.project }}/joy2d_${{ matrix.project }}.html" ]; then
            mv "_site_${{ matrix.project }}/joy2d_${{ matrix.project }}.html" "_site_${{ matrix.project }}/index.html"
          fi
          cp build/*.data _site_${{ matrix.project }}/ 2>/dev/null || true

      - name: Fix permissions
        run: |
          chmod -c -R +rX "_site_${{ matrix.project }}" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact (matrix)
        uses: actions/upload-artifact@v4
        with:
          name: joy2d_${{ matrix.project }}-web
          path: _site_${{ matrix.project }}/

  deploy:
    needs: build-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download loader artifact
        uses: actions/download-artifact@v4
        with:
          name: joy2d_loader-web
          path: _site/

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # 默认使用 github-pages artifact