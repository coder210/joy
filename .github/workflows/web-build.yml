name: Build joy2d For Web
on: [push, pull_request]

jobs:
  build-web:
    name: Build joy2d for Web (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [joy2d_editor, adventure_server, adventure_client]
        include:
          - project: joy2d_editor
            build_macro: "BUILD_JOY2D_EDITOR"
          - project: adventure_server
            build_macro: "BUILD_ADVENTURE_SERVER"
          - project: adventure_client
            build_macro: "BUILD_ADVENTURE_CLIENT"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git --depth=1
          cd emsdk
          ./emsdk install 3.1.64
          ./emsdk activate 3.1.64

      - name: Configure with Emscripten
        run: |
          source emsdk/emsdk_env.sh
          emcmake cmake -S . -B build \
            -DCMAKE_EXE_LINKER_FLAGS="-s ALLOW_MEMORY_GROWTH=1 -s TOTAL_MEMORY=256MB -s STACK_SIZE=5MB" \
            -DCMAKE_C_FLAGS="-s USE_PTHREADS=0" \
            -DCMAKE_CXX_FLAGS="-s USE_PTHREADS=0 -s DISABLE_EXCEPTION_CATCHING=0" \
            -D${{ matrix.build_macro }}=ON

      - name: Build
        run: |
          source emsdk/emsdk_env.sh
          cmake --build build --parallel --verbose

      - name: List build directory (debug)
        run: ls -la build/

      - name: Prepare for upload (per project)
        run: |
          mkdir -p _site_${{ matrix.project }}
          # 复制所有 Web 相关文件（跟随符号链接）
          # 注意：如果文件不存在，cp 会报错并导致步骤失败，便于及时发现缺失文件
          cp -L build/Release/*.wasm build/Release/*.js build/Release/*.html build/Release/*.data _site_${{ matrix.project }}/ || true
          # 将主 HTML 重命名为 index.html（如果存在）
          if [ -f "_site_${{ matrix.project }}/${{ matrix.project }}.html" ]; then
            mv "_site_${{ matrix.project }}/${{ matrix.project }}.html" "_site_${{ matrix.project }}/index.html"
          fi
          # 删除任何残留的符号链接（确保安全）
          find _site_${{ matrix.project }} -type l -delete

      - name: Verify no symlinks remain
        run: |
          if [ $(find _site_${{ matrix.project }} -type l | wc -l) -ne 0 ]; then
            echo "::error::Symlinks still exist in artifact"
            exit 1
          fi

      - name: List upload directory content
        run: ls -la _site_${{ matrix.project }}/

      - name: Fix permissions
        run: |
          chmod -c -R +rX "_site_${{ matrix.project }}" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      # 使用专为 GitHub Pages 设计的 artifact 上传 action
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ matrix.project }}-web   # 为每个项目指定唯一名称
          path: _site_${{ matrix.project }}/

  deploy:
    needs: build-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages (editor only)
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: adventure_client-web   # 必须与上传时 editor 项目的 artifact 名称一致