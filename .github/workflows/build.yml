name: Build joy2d
on: [push, pull_request]

jobs:
  build-win:
    name: Build for Windows (${{ matrix.project }}-${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]
        target: [Windows]
        project: [loader, adventure]
        include:
          - project: loader
            build_macro: "BUILD_LOADER"
          - project: adventure
            build_macro: "BUILD_ADVENTURE"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: cmd
        run: |
          cmake -DCMAKE_SYSTEM_NAME=${{ matrix.target }} ^
                -DCMAKE_SYSTEM_VERSION="10.0" ^
                -A${{ matrix.arch }} ^
                -D${{ matrix.build_macro }}=ON ^
                -S . -B build

      - name: Build
        run: cmake --build build --target joy2d_${{ matrix.project }} --config Release

      - name: Upload Build
        uses: actions/upload-artifact@v4
        if: ${{ matrix.target != 'WindowsStore' }}
        with:
          name: joy2d_${{ matrix.project }}-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            build/Release/*.exe
            build/Release/*.dll

  build-linux:
    name: Build for Linux (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [loader, adventure]
        include:
          - project: loader
            build_macro: "BUILD_LOADER"
          - project: adventure
            build_macro: "BUILD_ADVENTURE"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends build-essential git cmake ninja-build \
            gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libjack-dev \
            libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev \
            libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev \
            fcitx-libs-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev \
            libxtst-dev

      - name: Configure
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -D${{ matrix.build_macro }}=ON \
                -S . -B build

      - name: Build
        run: cmake --build build --target joy2d_${{ matrix.project }} --config Release

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: joy2d_${{ matrix.project }}-Linux
          path: |
            build/Release/joy2d_${{ matrix.project }}
            build/Release/*.so

  build-mac:
    name: Build for Apple (${{ matrix.project }}-${{ matrix.target == '' && 'desktop' || matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [iOS, tvOS, visionOS, 'desktop']      # '' 表示 macOS 本地
        project: [loader, adventure]
        include:
          - project: loader
            build_macro: "BUILD_LOADER"
          - project: adventure
            build_macro: "BUILD_ADVENTURE"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: "16.1"

      - name: Configure
        run: |
          cmake -G "Xcode" \
                -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
                -DCMAKE_SYSTEM_NAME=${{ matrix.target }} \
                -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
                -D${{ matrix.build_macro }}=ON \
                -S . -B build

      - name: Build
        run: cmake --build build --target joy2d_${{ matrix.project }} --config Release

      - name: Ad-Hoc Codesign
        run: |
          codesign -s - -f "./build/Release/joy2d_${{ matrix.project }}.app" --deep

      - name: Create DMG
        run: |
          cd build
          hdiutil create -size 2g -srcfolder Release \
            -volname joy2d_${{ matrix.project }}_apple_${{ matrix.target }} \
            joy2d_${{ matrix.project }}_apple_${{ matrix.target }}.dmg

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: joy2d_${{ matrix.project }}-apple-${{ matrix.target }}
          path: build/*.dmg